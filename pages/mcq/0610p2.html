<body>
    <nav id="topbar"> </nav>
    <main id="quiz-screen">
        <div id="loading-wrapper" role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <span>Loading</span>
        </div>

        <div id="quiz-setting" class="hidden"> </div>

        <div id="quiz-wrapper" class="hidden">
            <div id="counter"></div>
            <fieldset id="qBox">
                <div id="qDescription"> </div>
                <div id="options"> </div>
            </fieldset>
            <div id="btn-wrapper">
                <button id="nextBtn">Next</button>
            </div>
        </div>
        <div id="result-wrapper" class="hidden">
            <div id="result"></div><br><br>
            <button id="backBtn">Back</button>
        </div>
    </main>
</body>
<script type="module">
    import * as utils from "../../js/utils.js";

    const VIEWS = {
        LOADING: "loading",
        SETTINGS: "settings",
        QUIZ: "quiz",
        RESULT: "result"
    };

    const OPTIONS = ["A", "B", "C", "D"];

    const QUESTION_COUNT_CHOICES = [
        { text: "10 Questions", value: "10" },
        { text: "20 Questions", value: "20" },
        { text: "All Questions", value: "all" }
    ];

    const DOM = {
        loadingWrapper: document.getElementById("loading-wrapper"),
        counter: document.getElementById("counter"),
        quizSetting: document.getElementById("quiz-setting"),
        quizWrapper: document.getElementById("quiz-wrapper"),
        qBox: document.getElementById("qBox"),
        qDescription: document.getElementById("qDescription"),
        options: document.getElementById("options"),
        resultWrapper: document.getElementById("result-wrapper"),
        result: document.getElementById("result"),
        nextBtn: document.getElementById("nextBtn"),
        backBtn: document.getElementById("backBtn")
    };

    const mcqState = {
        selectedQuestions: [],
        currentIndex: 0,
        score: 0
    };

    let questions = [];
    let yearList = [];
    let selectedPaper;
    let urlTopicFilter = null;

    async function init() {
        showView(VIEWS.LOADING);
        utils.loadTopbar();

        const data = await import("../../data/0610.js");
        questions = data.qp2_0610_questions;
        yearList = data.qp2_0610_list;

        const urlParams = new URLSearchParams(window.location.search);
        urlTopicFilter = urlParams.get("title");

        if (urlTopicFilter) {
            renderPaperListByTopic();
        } else {
            renderPaperListByYear();
        }

        showView(VIEWS.SETTINGS);
    }

    function showView(view) {
        DOM.loadingWrapper.classList.toggle("hidden", view !== VIEWS.LOADING);
        DOM.quizSetting.classList.toggle("hidden", view !== VIEWS.SETTINGS);
        DOM.quizWrapper.classList.toggle("hidden", view !== VIEWS.QUIZ);
        DOM.resultWrapper.classList.toggle("hidden", view !== VIEWS.RESULT);
    }

    function waitForLoadingPaint() {
        return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function renderPaperListByYear() {
        const quizSetting = DOM.quizSetting;
        quizSetting.innerHTML = "";

        const list = yearList;
        const years = utils.getYears(list);
        const grouped = utils.groupByYear(list);

        years.forEach(year => {
            const block = utils.createYearWrapper(year, grouped[year]);
            quizSetting.appendChild(block);
        });

        utils.addAllClassesProperty(".year-content", "hidden");

        quizSetting.onclick = (e) => {
            const header = e.target.closest(".year-header");
            if (!header) return;

            const year = header.dataset.year;

            utils.addAllClassesProperty(".year-content", "hidden");
            utils.removeIdProperty(`year-${year}`, "hidden");
        };

        quizSetting.onchange = (e) => {
            if (e.target.name !== "paper") return;

            selectedPaper = e.target.value;
            startYearQuiz();
        };
    }

    async function startYearQuiz() {
        showView(VIEWS.LOADING);
        await waitForLoadingPaint();

        mcqState.selectedQuestions = questions.filter(q => q.paper === selectedPaper);
        await startQuiz();
    }

    function renderPaperListByTopic() {
        const quizSetting = DOM.quizSetting;
        quizSetting.innerHTML = "";

        const labelTitle = document.createElement("div");
        labelTitle.className = "title";
        labelTitle.textContent = "Number of Questions";

        const numSelector = document.createElement("div");

        QUESTION_COUNT_CHOICES.forEach(choice => {
            numSelector.appendChild(createQuestionCountOption(choice));
        });

        quizSetting.appendChild(labelTitle);
        quizSetting.appendChild(numSelector);

        quizSetting.onchange = (e) => {
            if (e.target.name !== "num-questions") return;

            startTopicQuiz();
        };
    }

    function createQuestionCountOption(choice) {
        const label = document.createElement("label");
        label.className = "num-selector";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "num-questions";
        radio.value = choice.value;

        label.appendChild(radio);
        label.append(choice.text);

        return label;
    }

    async function startTopicQuiz() {
        showView(VIEWS.LOADING);
        await waitForLoadingPaint();

        const filteredQuestions = questions.filter(q =>
            q.topic === urlTopicFilter && (!q.show || q.show === "yes")
        );

        const selectedRadio = DOM.quizSetting.querySelector('input[name="num-questions"]:checked');
        const numQuestions = selectedRadio ? selectedRadio.value : "all";

        if (numQuestions === "all") {
            mcqState.selectedQuestions = filteredQuestions;
        } else {
            const limit = parseInt(numQuestions, 10);
            mcqState.selectedQuestions = shuffleQuestions(filteredQuestions).slice(0, limit);
        }

        await startQuiz();
    }

    function shuffleQuestions(questionList) {
        const shuffled = [...questionList];

        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }

        return shuffled;
    }

    async function startQuiz() {
        mcqState.currentIndex = 0;
        mcqState.score = 0;
        await renderQuestion();
        showView(VIEWS.QUIZ);
    }

    async function renderQuestion() {
        if (mcqState.selectedQuestions.length === 0) {
            DOM.counter.textContent = "";
            DOM.qDescription.textContent = "No questions found for this selection.";
            DOM.options.innerHTML = "";
            DOM.qBox.disabled = true;
            return;
        }

        const q = mcqState.selectedQuestions[mcqState.currentIndex];
        await preloadQuestionImages(q);

        DOM.counter.textContent = `Question ${mcqState.currentIndex + 1} / ${mcqState.selectedQuestions.length}`;

        DOM.qDescription.innerHTML = formatQuestionDescription(q);

        DOM.options.innerHTML = "";
        DOM.options.appendChild(createOptions(q));

        DOM.qBox.disabled = false;
        DOM.nextBtn.disabled = false;
    }

    function formatQuestionDescription(q) {
        let description = q.desc.replace(/\n/g, "<br>");

        if (q.i) { description = description.replace("[[i]]", utils.renderImage(`../../${q.i}`)); }
        if (q.i2) { description = description.replace("[[i2]]", utils.renderImage(`../../${q.i2}`)); }
        if (q.t) { description = description.replace("[[t]]", utils.convertToTable(q.t)); }
        if (q.t2) { description = description.replace("[[t2]]", utils.convertToTable(q.t2)); }

        return description;
    }

    function createOptions(q) {
        const optionsWrapper = document.createElement("div");
        const hasDescription = OPTIONS.some(opt => q[opt]);

        optionsWrapper.classList.add(
            "options-wrapper",
            hasDescription ? "block-options" : "inline-options"
        );

        OPTIONS.forEach(opt => {
            optionsWrapper.appendChild(createOption(q, opt));
        });

        return optionsWrapper;
    }

    function createOption(q, opt) {
        const label = document.createElement("label");
        label.classList.add("option");

        label.innerHTML = `
            <input type="radio" name="option-${mcqState.currentIndex}" value="${opt}">
            <div class="opt-description">
                <div class="opt-letter">${opt}</div>
                <div class="opt-text">${q[opt] ?? ""}</div>
            </div>
        `;

        const input = label.querySelector("input");
        input.addEventListener("change", (e) => {
            handleAnswer(e.target.value);
        });

        return label;
    }

    function preloadQuestionImages(q) {
        const imagePaths = ["i", "i2"]
            .map(key => q[key])
            .filter(Boolean)
            .map(src => `../../${src}`);

        return Promise.all(imagePaths.map(preloadImage));
    }

    function preloadImage(src) {
        return new Promise(resolve => {
            const image = new Image();
            image.onload = resolve;
            image.onerror = resolve;
            image.src = src;
        });
    }

    function handleAnswer(selected) {
        const q = mcqState.selectedQuestions[mcqState.currentIndex];

        if (selected === q.ans) {
            mcqState.score++;
        }

        const labels = document.querySelectorAll(".option");

        labels.forEach(label => {
            const input = label.querySelector("input");

            if (input.value === q.ans) {
                label.style.background = "#c8f7c5";
            } else if (input.checked) {
                label.style.background = "#f7c5c5";
            }
        });

        DOM.qBox.disabled = true;
    }

    async function handleNextQuestion() {
        mcqState.currentIndex++;
        if (mcqState.currentIndex < mcqState.selectedQuestions.length) {
            showView(VIEWS.LOADING);
            await waitForLoadingPaint();
            await renderQuestion();
            showView(VIEWS.QUIZ);
        } else {
            showResult();
        }
    }

    function handleBack() {
        mcqState.currentIndex = 0;
        mcqState.score = 0;
        mcqState.selectedQuestions = [];

        if (urlTopicFilter) {
            renderPaperListByTopic();
        } else {
            renderPaperListByYear();
        }

        showView(VIEWS.SETTINGS);
    }

    document.addEventListener("click", async (event) => {
        const clickedButton = event.target.closest("button");
        if (!clickedButton) return;

        switch (true) {
            case clickedButton === DOM.nextBtn:
                DOM.nextBtn.disabled = true;
                await handleNextQuestion();
                break;

            case clickedButton === DOM.backBtn:
                handleBack();
                break;

            default:
                break;
        }
    });

    function showResult() {
        const result = DOM.result;
        result.textContent = "";

        const heading = document.createElement("h2");
        heading.textContent = "Quiz Completed";

        const scoreText = document.createElement("p");
        scoreText.textContent = `Your score: ${mcqState.score} / ${mcqState.selectedQuestions.length}`;

        result.appendChild(heading);
        result.appendChild(scoreText);

        showView(VIEWS.RESULT);
    }

    document.addEventListener("DOMContentLoaded", () => {
        init();
    });
</script>
